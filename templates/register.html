{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block public_content %}
<div class="w-full max-w-md mx-auto">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-600 shadow-xl shadow-brand-600/40 mb-4">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold text-white tracking-tight">AutoJob</h1>
    <p class="text-slate-400 mt-1 text-sm">Start automating your job search today</p>
  </div>

  <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 shadow-2xl">
    <h2 class="text-xl font-bold text-white mb-6">Create your account</h2>

    <form method="POST" action="{{ url_for('register') }}" id="regForm" class="space-y-5">
      <div>
        <label for="username" class="block text-sm font-semibold text-slate-300 mb-1.5">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"
          placeholder="Choose a username" />
      </div>
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-300 mb-1.5">Email Address</label>
        <input type="email" id="email" name="email" required autocomplete="email"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"
          placeholder="you@example.com" />
      </div>
      <div>
        <label for="password" class="block text-sm font-semibold text-slate-300 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" id="password" name="password" required autocomplete="new-password"
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all pr-12"
            placeholder="Create a strong password" />
          <button type="button" onclick="togglePwd('password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <!-- Password strength -->
        <div class="mt-2 h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
          <div id="strengthBar" class="h-full rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
        <p id="strengthText" class="text-xs text-slate-400 mt-1"></p>
      </div>
      <div>
        <label for="confirm_password" class="block text-sm font-semibold text-slate-300 mb-1.5">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password"
          class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent transition-all"
          placeholder="Repeat password" />
        <p id="matchError" class="text-xs text-red-400 mt-1 hidden">Passwords do not match</p>
      </div>

      <button type="submit" id="regBtn"
        class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl transition-all duration-200 shadow-lg shadow-brand-600/30 active:scale-[0.98] flex items-center justify-center gap-2">
        <span id="regBtnText">Create Account</span>
        <svg id="regSpinner" class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>
    </form>

    <p class="text-center text-slate-400 text-sm mt-6">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-brand-400 font-semibold hover:text-brand-300 transition-colors">Sign in</a>
    </p>
  </div>
</div>

<script>
function togglePwd(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
const pwdInput = document.getElementById('password');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');
pwdInput.addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
  const labels = ['Weak', 'Fair', 'Good', 'Strong'];
  strengthBar.className = 'h-full rounded-full transition-all duration-300 ' + (colors[score - 1] || 'bg-transparent');
  strengthBar.style.width = (score * 25) + '%';
  strengthText.textContent = score > 0 ? labels[score - 1] : '';
});
document.getElementById('confirm_password').addEventListener('input', function() {
  const match = this.value === pwdInput.value;
  document.getElementById('matchError').classList.toggle('hidden', match || this.value === '');
});
document.getElementById('regForm').addEventListener('submit', function() {
  document.getElementById('regBtnText').textContent = 'Creating...';
  document.getElementById('regSpinner').classList.remove('hidden');
});
</script>
{% endblock %}
